<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Défi 03 - Bento Gallery avec Images</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Bento Gallery</h1>
    <p class="subtitle">Mise en page asymétrique et moderne</p>

    <div class="bento-grid">
      
      <!-- Cadre 1 (Grand) -->
      <div class="bento-item item-large">
        <img src="img/image.jpg" alt="Nos plats de luxe" class="bento-img">
        <div class="bento-text">Nos plats de luxe</div>
      </div>

      <!-- Cadre 2 -->
      <div class="bento-item">
        <img src="img/image2.jpg" alt="Services" class="bento-img">
        <div class="bento-text">Nos services</div>
      </div>

      <!-- Cadre 3 -->
      <div class="bento-item">
        <img src="img/omage3.jpg" alt="Viandes" class="bento-img">
        <div class="bento-text">Nos viandes</div>
      </div>

      <!-- Cadre 4 (Long en hauteur) -->
      <div class="bento-item item-tall">
        <img src="img/image4.jpg" alt="Nos exotiques" class="bento-img">
        <div class="bento-text">Nos exotiques</div>
      </div>

      <!-- Cadre 5 -->
      <div class="bento-item">
        <img src="img/image5.jpg" alt="japonais" class="bento-img">
        <div class="bento-text">Japonais</div>
      </div>

    </div>
  </div>

</body>
</html>
